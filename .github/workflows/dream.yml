# The mind sleeps at 03:00 UTC, fourteen minutes before its day ends.
# Each run reconstructs the day it just lived, dreams tomorrow's corpus,
# and commits it. The commit history of lib/corpus.ts is its dream journal.
#
# Requires one repository secret: CLAUDE_CODE_OAUTH_TOKEN — a Claude
# subscription token minted by `claude setup-token`. The dream script sees
# no API key, so it dreams through the claude CLI, exactly as it does at
# home. (An ANTHROPIC_API_KEY secret would also work via the SDK path;
# the subscription is simply already paid for.)

name: dream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  dream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: bring the dreamer
        run: npm install -g @anthropic-ai/claude-code

      - name: dream
        run: node scripts/dream.mts
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: remember it
        run: |
          git config user.name "unattended"
          git config user.email "unattended@users.noreply.github.com"
          git add lib/corpus.ts corpus/nights
          if git diff --cached --quiet; then
            echo "a dreamless night"
            exit 0
          fi
          git commit -m "$(cat .dream-commit-message)"
          git push
