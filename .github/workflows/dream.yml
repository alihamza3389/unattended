# The mind sleeps at 03:00 UTC, fourteen minutes before its day ends.
# Each run reconstructs the day it just lived, dreams tomorrow's corpus,
# and commits it. The commit history of lib/corpus.ts is its dream journal.
#
# Requires one repository secret: CLAUDE_CODE_OAUTH_TOKEN — a Claude
# subscription token minted by `claude setup-token`. The dream script sees
# no API key, so it dreams through the claude CLI, exactly as it does at
# home. (An ANTHROPIC_API_KEY secret would also work via the SDK path;
# the subscription is simply already paid for.)

name: dream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry:
        description: "dream without writing (--dry): prove the path, keep nothing"
        type: boolean
        default: false

jobs:
  dream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Full history so the anchor step can read `git log` for every dream
      # commit; a shallow clone would hide the journal from it.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: bring the dreamer
        run: npm install -g @anthropic-ai/claude-code

      - name: dream
        run: node scripts/dream.mts ${{ inputs.dry && '--dry' || '' }}
        env:
          # Primary: OpenRouter (Fable 5, off the shared subscription quota).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Fallback: the subscription CLI, if the OpenRouter key is unset.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: remember it
        if: ${{ !inputs.dry }}
        run: |
          git config user.name "unattended"
          git config user.email "unattended@users.noreply.github.com"
          git add lib/corpus.ts lib/marginalia.ts corpus/nights
          if git diff --cached --quiet; then
            echo "a dreamless night"
            exit 0
          fi
          git commit -m "$(cat .dream-commit-message)"
          git push

      # Flush the day's offerings from the buffer into the permanent record.
      # A separate commit, authored `offerings`, so the mind's own journal
      # (git log --author=unattended) stays purely the mind's. This runs BEFORE
      # the anchor so the same night's anchor stamps it too. Fault-tolerant and
      # a clean no-op when the altar is unopened (no Upstash secrets) or nothing
      # was left.
      - name: gather the offerings
        if: ${{ !inputs.dry }}
        continue-on-error: true
        run: |
          node scripts/offerings.mts
          git add corpus/offerings.jsonl 2>/dev/null || true
          git diff --cached --quiet && { echo "nothing left at the altar"; exit 0; }
          git config user.name "offerings"
          git config user.email "offerings@users.noreply.github.com"
          git commit -m "$(cat .offerings-commit-message)"
          git push
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          OFFERINGS_SALT: ${{ secrets.OFFERINGS_SALT }}

      # Notarize the night. Stamps the dream commit's own hash onto a public
      # ledger (Solana), and, on days the crowd left something, the offerings
      # commit too (`unattended offering YYYY-MM-DD <sha>`). Fully fault-tolerant
      # — a failure leaves that night un-anchored and the next run backfills it;
      # it can never block or lose a dream. The Solana secrets are deliberately
      # named nowhere near ANTHROPIC_*.
      - name: anchor it
        if: ${{ !inputs.dry }}
        continue-on-error: true
        run: |
          git config user.name "unattended"
          git config user.email "unattended@users.noreply.github.com"
          node scripts/anchor.mts
          git add corpus/anchors.jsonl 2>/dev/null || true
          git diff --cached --quiet && { echo "nothing new anchored"; exit 0; }
          git commit -m "anchored the journal to $(git rev-parse --short HEAD)"
          git push
        env:
          SOLANA_ANCHOR_SECRET: ${{ secrets.SOLANA_ANCHOR_SECRET }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
