# Just after the day's first thought (03:14 UTC), carry it out to X and
# Bluesky with a link to its permanent address. Independent of the dream:
# the thought exists whether or not the night dreamt anything new.
#
# Requires per-platform secrets; a platform with none is simply skipped:
#   X: X_API_KEY X_API_SECRET X_ACCESS_TOKEN X_ACCESS_TOKEN_SECRET
#   Bluesky: BLUESKY_IDENTIFIER BLUESKY_APP_PASSWORD

name: post

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "post to which platform"
        type: choice
        options: [both, x, bluesky]
        default: both

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: carry it out
        run: node scripts/post.mts --only "${{ inputs.only || 'both' }}"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
